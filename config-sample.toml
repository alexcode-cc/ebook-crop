# PDF 電子書裁切設定
# 複製此檔為 config.toml 後依需求修改
# 單位：點 (points)，1 英吋 = 72 點，約 2.54 公分
# 支援單位：pt（點）、cm（公分）、mm（公釐）、in/inch（英吋）

[margins]
# 左側留白裁切量（點）
left = 36
# 右側留白裁切量（點）
right = 36
# 上方留白裁切量（點）
top = 36
# 下方留白裁切量（點）
bottom = 36

# 也可使用單位字串：
# left = "1cm"
# right = "10mm"
# top = "0.5in"
# bottom = "36pt"

[pages]
# 開始裁切頁數（1-based，預設 2 = 封面不裁切）
# 0 或 1 = 從第 1 頁開始裁切（封面也裁切）
start = 2
# 結束裁切頁數（預設 0 = 裁切到最後一頁）
# -1 = 最後一頁不裁切（封底不裁切）
end = 0

# 頁面旋轉（掃描電子書角度修正，支援任意角度）
# 頁碼 1-based，角度：正值=順時針、負值=逆時針
# pages 支援：逗號 "1,3,5"、範圍 "3-9"、"3-0"（0=最後一頁）、"0-0"（全文件）
# skip=1 表示每隔一頁
# [[rotation]]
# pages = "3-0"
# skip = 1
# angle = -1
# [[rotation]]
# page = 12
# angle = 90
